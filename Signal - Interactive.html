        const ARTICLES = [
            {
                id: 1,
                title: "When Good Things End",
                category: "Essay",
                date: "April 24, 2026",
                excerpt: "A meditation on transitions, leadership changes, and what it means to let go.",
                tags: ["leadership", "growth"],
                author: "Editorial Team",
                readTime: "5 min",
                body: `A meditation on transitions, leadership changes, and what it means to let go. Sometimes the best thing we can do is make space for what comes next.

        function App() {
            const [currentView, setCurrentView] = useState('home');
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [showEmailModal, setShowEmailModal] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [email, setEmail] = useState('');
            const [emailSuccess, setEmailSuccess] = useState(false);
            const [articles, setArticles] = useState(ARTICLES);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [newArticle, setNewArticle] = useState({
                title: '',
                category: 'Essay',
                date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                excerpt: '',
                tags: '',
                author: 'Editorial Team',
                readTime: '5 min',
                body: ''
            });

            useEffect(() => {
                const saved = localStorage.getItem('signal-darkMode');
                if (saved) setIsDarkMode(JSON.parse(saved));
                
                // Check for admin login
                const adminSession = localStorage.getItem('signal-admin-logged-in');
                if (adminSession) setIsLoggedIn(true);

                // Watch for hash changes
                const handleHashChange = () => {
                    if (window.location.hash === '#admin') {
                        if (localStorage.getItem('signal-admin-logged-in')) {
                            setCurrentView('admin');
                        } else {
                            setCurrentView('login');
                        }
                    } else {
                        setCurrentView('home');
                        setSelectedArticle(null);
                    }
                };

                window.addEventListener('hashchange', handleHashChange);
                
                // Check initial hash on load
                if (window.location.hash === '#admin') {
                    if (localStorage.getItem('signal-admin-logged-in')) {
                        setCurrentView('admin');
                    } else {
                        setCurrentView('login');
                    }
                }

                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            useEffect(() => {
                // Persist articles to localStorage
                localStorage.setItem('signal-articles', JSON.stringify(articles));
            }, [articles]);

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === ADMIN_PASSWORD) {
                    setIsLoggedIn(true);
                    localStorage.setItem('signal-admin-logged-in', 'true');
                    setAdminPassword('');
                } else {
                    alert('Invalid password');
                }
            };

            const handleAdminLogout = () => {
                setIsLoggedIn(false);
                localStorage.removeItem('signal-admin-logged-in');
                setCurrentView('home');
                window.location.hash = '';
            };

            const handlePublishArticle = (e) => {
                e.preventDefault();
                if (!newArticle.title || !newArticle.excerpt || !newArticle.body) {
                    alert('Please fill in all required fields');
                    return;
                }

                const article = {
                    id: Math.max(...articles.map(a => a.id), 0) + 1,
                    ...newArticle,
                    tags: newArticle.tags.split(',').map(t => t.trim()),
                    relatedIds: []
                };

                setArticles([article, ...articles]);
                setNewArticle({
                    title: '',
                    category: 'Essay',
                    date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                    excerpt: '',
                    tags: '',
                    author: 'Editorial Team',
                    readTime: '5 min',
                    body: ''
                });
                alert('Article published!');
            };

            const handleDeleteArticle = (id) => {
                if (confirm('Delete this article?')) {
                    setArticles(articles.filter(a => a.id !== id));
                }
            };

            const toggleDarkMode = () => {
                const newMode = !isDarkMode;
                setIsDarkMode(newMode);
                localStorage.setItem('signal-darkMode', JSON.stringify(newMode));
                document.body.className = newMode ? '' : 'light-mode';
            };

            useEffect(() => {
                document.body.className = isDarkMode ? '' : 'light-mode';
            }, [isDarkMode]);

            const handleSearch = (query) => {
                setSearchQuery(query.toLowerCase());
            };

            const filteredArticles = articles.filter(a => 
                a.title.toLowerCase().includes(searchQuery) ||
                a.excerpt.toLowerCase().includes(searchQuery) ||
                a.tags.some(t => t.toLowerCase().includes(searchQuery))
            );

            const handleSubscribe = (e) => {
                e.preventDefault();
                if (email) {
                    setEmailSuccess(true);
                    setTimeout(() => {
                        setShowEmailModal(false);
                        setEmail('');
                        setEmailSuccess(false);
                    }, 2000);
                }
            };

            const shareArticle = (platform) => {
                const url = window.location.href;
                const title = selectedArticle.title;
                
                const shares = {
                    twitter: `https://twitter.com/intent/tweet?text="${title}" on Signal&url=${url}`,
                    linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${url}`,
                    copy: () => {
                        navigator.clipboard.writeText(url);
                        alert('Link copied!');
                    }
                };

                if (platform === 'copy') {
                    shares.copy();
                } else {
                    window.open(shares[platform], '_blank', 'width=600,height=400');
                }
            };

            const getRelatedArticles = () => {
                if (!selectedArticle) return [];
                return articles.filter(a => selectedArticle.relatedIds.includes(a.id));
            };

            // Login view
            if (currentView === 'login') {
                return (
                    <div className="app">
                        <header className="header">
                            <div className="logo" onClick={() => { window.location.hash = ''; }}>
                                Signal
                            </div>
                        </header>

                        <div className="container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', paddingTop: 0 }}>
                            <div className="modal" style={{ maxWidth: '400px' }}>
                                <h2 style={{ marginBottom: '1rem' }}>Admin Access</h2>
                                <form onSubmit={handleAdminLogin}>
                                    <div className="form-group">
                                        <label>Password</label>
                                        <input
                                            type="password"
                                            value={adminPassword}
                                            onChange={(e) => setAdminPassword(e.target.value)}
                                            placeholder="Enter password"
                                            autoFocus
                                        />
                                    </div>
                                    <button type="submit" className="btn" style={{ width: '100%' }}>
                                        Login
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            // Admin panel view
            if (currentView === 'admin') {
                return (
                    <div className="app">
                        <header className="header">
                            <div className="logo" onClick={() => { window.location.hash = ''; }}>
                                Signal Admin
                            </div>
                            <button className="nav-btn" onClick={handleAdminLogout}>
                                Logout
                            </button>
                        </header>

                        <div className="container" style={{ paddingTop: '10rem' }}>
                            <h1 style={{ marginBottom: '2rem' }}>Publish New Article</h1>

                            <div className="glass-card">
                                <form onSubmit={handlePublishArticle}>
                                    <div className="form-group">
                                        <label>Title *</label>
                                        <input
                                            type="text"
                                            value={newArticle.title}
                                            onChange={(e) => setNewArticle({ ...newArticle, title: e.target.value })}
                                            placeholder="Article title"
                                            required
                                        />
                                    </div>

                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                        <div className="form-group">
                                            <label>Category</label>
                                            <select 
                                                value={newArticle.category}
                                                onChange={(e) => setNewArticle({ ...newArticle, category: e.target.value })}
                                                style={{ ...styles.input, cursor: 'pointer' }}
                                            >
                                                <option>Essay</option>
                                                <option>Philosophy</option>
                                                <option>Culture</option>
                                                <option>Guide</option>
                                                <option>Analysis</option>
                                            </select>
                                        </div>

                                        <div className="form-group">
                                            <label>Read Time</label>
                                            <input
                                                type="text"
                                                value={newArticle.readTime}
                                                onChange={(e) => setNewArticle({ ...newArticle, readTime: e.target.value })}
                                                placeholder="e.g., 5 min"
                                            />
                                        </div>
                                    </div>

                                    <div className="form-group">
                                        <label>Excerpt *</label>
                                        <textarea
                                            value={newArticle.excerpt}
                                            onChange={(e) => setNewArticle({ ...newArticle, excerpt: e.target.value })}
                                            placeholder="Short summary"
                                            rows="2"
                                            required
                                            style={{ ...styles.input, fontFamily: 'inherit' }}
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label>Tags (comma-separated)</label>
                                        <input
                                            type="text"
                                            value={newArticle.tags}
                                            onChange={(e) => setNewArticle({ ...newArticle, tags: e.target.value })}
                                            placeholder="e.g., media, culture, growth"
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label>Body *</label>
                                        <textarea
                                            value={newArticle.body}
                                            onChange={(e) => setNewArticle({ ...newArticle, body: e.target.value })}
                                            placeholder="Article content (use paragraph breaks)"
                                            rows="12"
                                            required
                                            style={{ ...styles.input, fontFamily: 'inherit' }}
                                        />
                                    </div>

                                    <button type="submit" className="btn" style={{ width: '100%', marginBottom: '1rem' }}>
                                        Publish Article
                                    </button>
                                </form>
                            </div>

                            <h2 style={{ marginTop: '3rem', marginBottom: '1.5rem' }}>Published Articles</h2>

                            <div className="archive-grid">
                                {articles.map(article => (
                                    <div key={article.id} className="glass-card" style={{ position: 'relative' }}>
                                        <button
                                            onClick={() => handleDeleteArticle(article.id)}
                                            style={{
                                                position: 'absolute',
                                                top: '1rem',
                                                right: '1rem',
                                                background: 'rgba(255, 0, 0, 0.3)',
                                                border: '1px solid rgba(255, 0, 0, 0.4)',
                                                color: '#ff6b6b',
                                                padding: '0.5rem 1rem',
                                                borderRadius: '6px',
                                                cursor: 'pointer',
                                                fontSize: '0.75rem',
                                                fontWeight: '600'
                                            }}
                                        >
                                            Delete
                                        </button>
                                        <div className="archive-card-date">{article.date}</div>
                                        <h3 className="archive-card-title">{article.title}</h3>
                                        <p className="archive-card-excerpt">{article.excerpt}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo" onClick={() => { setCurrentView('home'); setSelectedArticle(null); }}>
                            Signal
                        </div>
                        <div className="header-actions">
                            {isLoggedIn && (
                                <button className="nav-btn" onClick={() => { window.location.hash = '#admin'; setCurrentView('admin'); }}>
                                    ⚙️ Admin
                                </button>
                            )}
                            {!isLoggedIn && (
                                <button className="nav-btn" onClick={() => { window.location.hash = '#admin'; }} style={{ fontSize: '0.7rem', padding: '0.4rem 0.8rem' }}>
                                    Admin
                                </button>
                            )}
                            <input 
                                type="text" 
                                className="search-box" 
                                placeholder="Search..."
                                value={searchQuery}
                                onChange={(e) => handleSearch(e.target.value)}
                            />
                            <button className="mode-toggle" onClick={toggleDarkMode}>
                                {isDarkMode ? '☀️' : '🌙'}
                            </button>
                            <button className="nav-btn" onClick={() => setShowEmailModal(true)}>
                                Subscribe
                            </button>
                        </div>
                    </header>

                    {currentView === 'home' && !selectedArticle && (
                        <>
                            <div className="container">
                                <section className="hero">
                                    <h1>Signal</h1>
                                    <p>Clarity in the noise. Ad-free forever.</p>
                                    <div className="hero-cta">
                                        <button className="btn" onClick={() => setShowEmailModal(true)}>
                                            Subscribe Now
                                        </button>
                                        <button className="btn btn-secondary">Browse Archive</button>
                                    </div>
                                </section>

                                {filteredArticles.length > 0 && (
                                    <>
                                        <div className="glass-card" onClick={() => { setCurrentView('article'); setSelectedArticle(filteredArticles[0]); }}>
                                            <div className="card-badge">{filteredArticles[0].category}</div>
                                            <h2 className="card-title">{filteredArticles[0].title}</h2>
                                            <p className="card-text">{filteredArticles[0].excerpt}</p>
                                            <div className="card-actions">
                                                <button className="btn">Read Story</button>
                                                <button className="btn btn-secondary">☕ Support</button>
                                            </div>
                                            <div className="card-meta">
                                                {filteredArticles[0].date} • {filteredArticles[0].readTime} read
                                            </div>
                                        </div>

                                        <h2 className="section-heading">Recent Issues</h2>
                                        <div className="archive-grid">
                                            {filteredArticles.slice(1).map(article => (
                                                <div key={article.id} className="archive-card" onClick={() => { setCurrentView('article'); setSelectedArticle(article); }}>
                                                    <div className="archive-card-date">{article.date}</div>
                                                    <h3 className="archive-card-title">{article.title}</h3>
                                                    <p className="archive-card-excerpt">{article.excerpt}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}

                                <div className="cta-section">
                                    <h2 className="cta-title">Get Weekly Updates</h2>
                                    <p className="cta-desc">Thoughtful writing in your inbox</p>
                                    <button className="btn" onClick={() => setShowEmailModal(true)}>
                                        Subscribe
                                    </button>
                                </div>
                            </div>
                        </>
                    )}

                    {currentView === 'article' && selectedArticle && (
                        <div className="container article-view">
                            <button className="nav-btn" onClick={() => { setCurrentView('home'); setSelectedArticle(null); }} style={{ marginBottom: '2rem' }}>
                                ← Back to Issues
                            </button>

                            <div className="article-header">
                                <div className="article-badge">{selectedArticle.category}</div>
                                <h1 className="article-title">{selectedArticle.title}</h1>
                                <div className="article-meta">
                                    <span>{selectedArticle.date}</span>
                                    <span>{selectedArticle.readTime} read</span>
                                    <span>By {selectedArticle.author}</span>
                                </div>
                            </div>

                            <div className="article-body">
                                {selectedArticle.body.split('\n\n').map((para, i) => (
                                    <p key={i}>{para}</p>
                                ))}
                            </div>

                            <div className="cta-section" style={{ marginTop: '3rem' }}>
                                <h3 className="cta-title">Support Quality Writing</h3>
                                <button className="btn">☕ Buy us a Coffee</button>
                            </div>

                            <div className="glass-card" style={{ marginTop: '2rem' }}>
                                <h3 style={{ marginBottom: '1rem' }}>Share This Article</h3>
                                <div className="share-buttons">
                                    <button className="share-btn" onClick={() => shareArticle('twitter')}>
                                        Twitter
                                    </button>
                                    <button className="share-btn" onClick={() => shareArticle('linkedin')}>
                                        LinkedIn
                                    </button>
                                    <button className="share-btn" onClick={() => shareArticle('copy')}>
                                        Copy Link
                                    </button>
                                </div>
                            </div>

                            {getRelatedArticles().length > 0 && (
                                <>
                                    <h2 className="section-heading" style={{ marginTop: '3rem' }}>Related Articles</h2>
                                    <div className="archive-grid">
                                        {getRelatedArticles().map(article => (
                                            <div key={article.id} className="archive-card" onClick={() => setSelectedArticle(article)}>
                                                <div className="archive-card-date">{article.date}</div>
                                                <h3 className="archive-card-title">{article.title}</h3>
                                                <p className="archive-card-excerpt">{article.excerpt}</p>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    )}

                    {showEmailModal && (
                        <div className="modal-overlay" onClick={() => setShowEmailModal(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <button className="modal-close" onClick={() => setShowEmailModal(false)}>×</button>
                                {!emailSuccess ? (
                                    <>
                                        <h2>Get Weekly Issues</h2>
                                        <p>Join readers who actually open their email. No ads, no spam—just good writing.</p>
                                        <form onSubmit={handleSubscribe}>
                                            <div className="form-group">
                                                <label>Email Address</label>
                                                <input 
                                                    type="email" 
                                                    placeholder="you@example.com"
                                                    value={email}
                                                    onChange={(e) => setEmail(e.target.value)}
                                                    required
                                                />
                                            </div>
                                            <button type="submit" className="btn" style={{ width: '100%' }}>
                                                Subscribe
                                            </button>
                                        </form>
                                    </>
                                ) : (
                                    <div style={{ textAlign: 'center' }}>
                                        <h2>✓ Welcome!</h2>
                                        <p>Check your email for confirmation. Thanks for joining Signal!</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer className="footer">
                        <p>© 2026 Signal. Free forever. No ads. Ever. | <a href="#">About</a> | <a href="#">Archive</a></p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
